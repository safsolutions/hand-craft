<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeonDraw — қолмен жарқыраған сызық</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Камера ағыны (артқы фон, айналы, күңгірт) -->
  <video id="cam" playsinline></video>

  <!-- Жарқыраған сызық + қол қаңқасы -->
  <canvas id="overlay"></canvas>

  <!-- UI -->
  <div id="hud">
    <div class="row">
      <span class="badge" id="mode">Режим: —</span>
      <span class="badge" id="fps">FPS: —</span>
    </div>
    <div class="palette" id="palette"></div>
    <div class="hint">
      ☝️ көрсеткіш — сызу · 🤏 pinch — ұстап жүру · ✌️ V — кесу · ✊/🖐️ — тыныш ·
      <b>C</b> — тазарту
    </div>
  </div>

  <div id="loader">Камера мен модель жүктелуде…<br /><small>рұқсат сұралса — «Allow» бас</small></div>

  <!-- MediaPipe (қол тану) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
